version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: space-server
    image: satellite/server:v1
    environment:
      - SERVER_PORT=8080
    ports:
      - "8080:8080"
    networks:
      - space-net
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  mission-service:
    build:
      context: ./mission-service
      dockerfile: Dockerfile
    container_name: mission-service
    image: satellite/mission-service:v1
    depends_on:
      server:
        condition: service_healthy
    environment:
      - SERVER_PORT=8081
      - APP_SPACE_CENTER_SERVICE_URL=http://server:8080/api
    ports:
      - "8081:8081"
    networks:
      - space-net
    restart: unless-stopped

networks:
  space-net:
    driver: bridge
    name: satellite-network
